version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdfmerger
      POSTGRES_USER: pdfuser
      POSTGRES_PASSWORD: pdfpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfuser -d pdfmerger"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://pdfuser:pdfpass@db:5432/pdfmerger
      - DATABASE_URL_SYNC=postgresql://pdfuser:pdfpass@db:5432/pdfmerger
      - SECRET_KEY=change-this-to-a-very-long-random-string-in-production
      - JWT_SECRET_KEY=change-this-jwt-secret-key-in-production
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
      - APP_ENV=production
      - DEBUG=false
    volumes:
      - upload_data:/app/temp_uploads
      - merged_data:/app/temp_merged
      - logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:
  merged_data:
  logs: